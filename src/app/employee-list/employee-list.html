<div class="container mt-4">
  <h2 class="mb-4 text-center">Employee List</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Loading employees...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="alert alert-danger text-center">
    {{ errorMessage }}
  </div>

  <!-- Table -->
  <div *ngIf="!loading && !errorMessage" class="card shadow">
    <div class="card-body">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th class="text-center">Name</th>
            <th class="text-center">Email</th>
            <th class="text-center">Department</th>
            <th class="text-center">Designation</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let emp of employees">
            <td>{{ emp.first_name }} {{ emp.last_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.designation }}</td>
            <td>
              <div class="d-flex gap-2">
                <button [routerLink]="['/employees', emp._id]" class="btn btn-primary btn-sm">
                  View
                </button>
                <button (click)="openEditModal(emp)" class="btn btn-warning btn-sm">Edit</button>
                <button class="btn btn-danger btn-sm">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div
  *ngIf="showEditModal"
  class="modal fade show d-block"
  tabindex="-1"
  style="background-color: rgba(0, 0, 0, 0.5)"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Employee</h5>
        <button type="button" class="btn-close" (click)="closeEditModal()"></button>
      </div>

      <form [formGroup]="editForm">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" formControlName="first_name" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" formControlName="last_name" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" formControlName="department" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Designation</label>
              <input type="text" class="form-control" formControlName="designation" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Salary</label>
              <input type="number" class="form-control" formControlName="salary" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Gender</label>
              <select class="form-select" formControlName="gender">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Date of Joining</label>
              <input type="text" class="form-control" formControlName="date_of_joining" />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="editForm.invalid">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
