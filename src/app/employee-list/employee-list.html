<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1">Employee List</h2>
      <p class="text-muted mb-0">
        Logged in as <strong>{{ loggedInUsername }}</strong>
      </p>
    </div>

    <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
  </div>

  <button class="btn btn-success" (click)="openAddModal()">+ Add Employee</button>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Loading employees...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="alert alert-danger text-center">
    {{ errorMessage }}
  </div>

  <!-- Table -->
  <div *ngIf="!loading && !errorMessage" class="card shadow">
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-8">
          <input
            type="text"
            class="form-control"
            placeholder="Search by department or designation"
            [(ngModel)]="searchText"
            (keyup.enter)="searchEmployees()"
          />
        </div>

        <div class="col-md-4 d-flex gap-2">
          <button class="btn btn-primary" (click)="searchEmployees()">Search</button>
          <button class="btn btn-outline-secondary" (click)="clearSearch()">Clear</button>
        </div>
      </div>
      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th class="text-center">Photo</th>
            <th class="text-center">Name</th>
            <th class="text-center">Email</th>
            <th class="text-center">Department</th>
            <th class="text-center">Designation</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let emp of employees">
            <td>
              <img
                *ngIf="emp.employee_photo"
                [src]="emp.employee_photo"
                alt="Employee Photo"
                width="50"
                height="50"
                class="rounded-circle object-fit-cover"
              />
              <span *ngIf="!emp.employee_photo">—</span>
            </td>
            <td>{{ emp.first_name }} {{ emp.last_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.designation }}</td>
            <td>
              <div class="d-flex gap-2">
                <button [routerLink]="['/employees', emp._id]" class="btn btn-primary btn-sm">
                  View
                </button>
                <button (click)="openEditModal(emp)" class="btn btn-warning btn-sm">Edit</button>
                <button
                  (click)="deleteEmployee(emp._id, emp.first_name + ' ' + emp.last_name)"
                  class="btn btn-danger btn-sm"
                >
                  Delete
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div *ngIf="!loading && !errorMessage && employees.length === 0" class="alert alert-info">
        No employees found.
      </div>
    </div>
  </div>
</div>

<div
  *ngIf="showAddModal"
  class="modal fade show d-block"
  style="background-color: rgba(0, 0, 0, 0.5)"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Employee</h5>
        <button class="btn-close" (click)="closeAddModal()"></button>
      </div>

      <form [formGroup]="addForm" (ngSubmit)="saveNewEmployee()">
        <div class="col-md-12">
          <label class="form-label">Profile Photo</label>
          <input
            type="file"
            class="form-control"
            accept="image/*"
            (change)="onAddPhotoSelected($event)"
          />
        </div>

        <div class="col-md-12" *ngIf="addPhotoPreview">
          <img
            [src]="addPhotoPreview"
            alt="Preview"
            class="img-thumbnail mt-2"
            style="max-height: 180px"
          />
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label>First Name</label>
              <input class="form-control" formControlName="first_name" />
            </div>

            <div class="col-md-6">
              <label>Last Name</label>
              <input class="form-control" formControlName="last_name" />
            </div>

            <div class="col-md-6">
              <label>Email</label>
              <input class="form-control" formControlName="email" />
            </div>

            <div class="col-md-6">
              <label>Department</label>
              <input class="form-control" formControlName="department" />
            </div>

            <div class="col-md-6">
              <label>Designation</label>
              <input class="form-control" formControlName="designation" />
            </div>

            <div class="col-md-6">
              <label>Salary</label>
              <input type="number" class="form-control" formControlName="salary" />
            </div>

            <div class="col-md-6">
              <label>Gender</label>
              <select class="form-select" formControlName="gender">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>

            <div class="col-md-6">
              <label>Date of Joining</label>
              <input type="date" class="form-control" formControlName="date_of_joining" />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeAddModal()">Cancel</button>
          <button type="submit" class="btn btn-success" [disabled]="addForm.invalid">
            Add Employee
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<app-employee-edit-modal
  [employee]="selectedEmployee"
  [isOpen]="showEditModal"
  (closed)="closeEditModal()"
  (saved)="onEmployeeUpdated()"
></app-employee-edit-modal>
