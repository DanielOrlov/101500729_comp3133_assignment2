<div
  *ngIf="isOpen"
  class="modal fade show d-block"
  tabindex="-1"
  style="background-color: rgba(0, 0, 0, 0.5)"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Employee</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <form [formGroup]="editForm" (ngSubmit)="saveChanges()">
        <div class="modal-body">
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" formControlName="first_name" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" formControlName="last_name" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" formControlName="department" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Designation</label>
              <input type="text" class="form-control" formControlName="designation" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Salary</label>
              <input type="number" class="form-control" formControlName="salary" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Gender</label>
              <select class="form-select" formControlName="gender">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Date of Joining</label>
              <input type="date" class="form-control" formControlName="date_of_joining" />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="editForm.invalid || isSaving">
            {{ isSaving ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
